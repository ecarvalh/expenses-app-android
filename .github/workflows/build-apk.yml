name: Build signed APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read app version from twa-manifest.json
        id: version
        run: |
          CODE=$(grep -o '"appVersionCode": *[0-9]*' twa-manifest.json | grep -o '[0-9]*')
          echo "code=$CODE" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install build-tools 34
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore

      - name: Build unsigned release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Align and sign APK
        env:
          BUILD_TOOLS: ${{ env.ANDROID_HOME }}/build-tools/34.0.0
        run: |
          "$BUILD_TOOLS/zipalign" -v -f -p 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app-release-unsigned-aligned.apk
          "$BUILD_TOOLS/apksigner" sign \
            --ks android.keystore \
            --ks-key-alias android \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out app-release-signed.apk \
            app-release-unsigned-aligned.apk

      - name: Rename APK with version
        run: mv app-release-signed.apk "minhas-despesas-v${{ steps.version.outputs.code }}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: minhas-despesas-apk
          path: minhas-despesas-v${{ steps.version.outputs.code }}.apk

      - name: Publish GitHub Release (public download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.code }}
          name: Versão ${{ steps.version.outputs.code }}
          files: minhas-despesas-v${{ steps.version.outputs.code }}.apk
          generate_release_notes: true
